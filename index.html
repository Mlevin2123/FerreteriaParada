<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FERRETERÍA PARADA — Catálogo Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   RESET & VARIABLES
═══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --y:        #F5C518;
  --yd:       #D4A017;
  --yl:       #FFF8DC;
  --ydim:     rgba(245,197,24,0.12);
  --black:    #0A0A0A;
  --dark:     #111111;
  --card:     #1A1A1A;
  --border:   #252525;
  --borderL:  #303030;
  --t1:       #F2F2F2;
  --t2:       #9A9A9A;
  --t3:       #555;
  --success:  #22C55E;
  --danger:   #EF4444;
  --info:     #3B82F6;
  --wa:       #25D366;
  --r8:  8px; --r12: 12px; --r16: 16px; --r20: 20px; --r24: 24px;
  --sh: 0 2px 12px rgba(0,0,0,.5);
  --shL: 0 8px 40px rgba(0,0,0,.6);
  --tr: all .18s cubic-bezier(.4,0,.2,1);
  --ff: 'Barlow', sans-serif;
  --fd: 'Bebas Neue', 'Barlow Condensed', sans-serif;
}
.lm {
  --black:  #F2F2EE; --dark: #E8E8E4;
  --card:   #FFFFFF; --border: #E2E2E2; --borderL: #CCCCCC;
  --t1: #111; --t2: #555; --t3: #999;
  --ydim: rgba(245,197,24,0.1);
}

html { scroll-behavior:smooth; }
body {
  font-family:var(--ff); background:var(--black); color:var(--t1);
  min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-thumb { background:var(--borderL); border-radius:2px; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
input[type=number] { -moz-appearance:textfield; }

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar {
  background:var(--dark); border-bottom:1px solid var(--border);
  padding:0 14px; height:54px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.logo { display:flex; align-items:center; gap:9px; cursor:pointer; user-select:none; }
.logo-box {
  width:36px; height:36px; background:var(--y); border-radius:var(--r8);
  display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
  box-shadow:0 0 14px rgba(245,197,24,.25);
}
.logo-name { font-family:var(--fd); font-size:19px; letter-spacing:2px; color:var(--t1); line-height:1; }
.logo-sub { display:block; font-size:9px; font-weight:600; color:var(--y); letter-spacing:3px; text-transform:uppercase; }
.top-acts { display:flex; gap:5px; }
.ibtn {
  width:34px; height:34px; background:transparent; border:1px solid var(--borderL);
  border-radius:var(--r8); color:var(--t2); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:16px;
  transition:var(--tr); flex-shrink:0;
}
.ibtn:hover { background:var(--borderL); color:var(--t1); border-color:var(--y); }

/* ═══════════════════════════════════════════
   TABS (desktop)
═══════════════════════════════════════════ */
.tabs {
  display:flex; background:var(--dark); border-bottom:1px solid var(--border);
}
.tab {
  flex:1; padding:9px; text-align:center; color:var(--t3);
  font-size:10px; font-weight:700; cursor:pointer; border:none; background:none;
  letter-spacing:1px; text-transform:uppercase; transition:var(--tr); position:relative;
}
.tab-ic { font-size:16px; display:block; margin-bottom:2px; }
.tab.on { color:var(--y); }
.tab.on::after {
  content:''; position:absolute; bottom:0; left:18%; right:18%;
  height:2px; background:var(--y); border-radius:2px 2px 0 0;
}

/* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
.view { display:none; }
.view.on { display:block; }

/* ═══════════════════════════════════════════
   HERO / SEARCH
═══════════════════════════════════════════ */
.hero {
  background:var(--dark); padding:18px 14px 16px;
  border-bottom:1px solid var(--border); position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; top:-50px; right:-50px;
  width:180px; height:180px;
  background:radial-gradient(circle, rgba(245,197,24,.1) 0%, transparent 70%);
  pointer-events:none;
}
.hero-tag {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--ydim); border:1px solid rgba(245,197,24,.25);
  border-radius:20px; padding:3px 10px;
  font-size:10px; font-weight:700; color:var(--y);
  letter-spacing:1px; text-transform:uppercase; margin-bottom:7px;
}
.hero h2 {
  font-family:var(--fd); font-size:26px; letter-spacing:2px;
  color:var(--t1); margin-bottom:3px; line-height:1.1;
}
.hero p { font-size:12px; color:var(--t2); margin-bottom:12px; }

/* SEARCH — NO se re-renderiza, sólo actualiza la lista */
.srch-wrap { position:relative; display:flex; gap:8px; }
.srch-ic {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  font-size:14px; color:var(--t3); pointer-events:none; z-index:1;
}
#srch-input {
  flex:1; background:rgba(255,255,255,.05); border:1px solid var(--borderL);
  border-radius:var(--r12); padding:10px 13px 10px 36px;
  color:var(--t1); font-size:14px; font-family:var(--ff); outline:none; transition:var(--tr);
}
#srch-input::placeholder { color:var(--t3); }
#srch-input:focus { border-color:var(--y); background:var(--ydim); box-shadow:0 0 0 3px rgba(245,197,24,.08); }
.lm #srch-input { background:#fff; }

/* ═══════════════════════════════════════════
   SHARE BAR
═══════════════════════════════════════════ */
.share-bar {
  margin:12px 14px 0; background:var(--card);
  border:1px solid var(--border); border-radius:var(--r12); padding:11px 13px;
}
.share-lbl { font-size:10px; font-weight:700; color:var(--t3); letter-spacing:1px; text-transform:uppercase; margin-bottom:7px; }
.share-row { display:flex; gap:7px; flex-wrap:wrap; }
.sbtn {
  display:flex; align-items:center; gap:5px; padding:6px 12px;
  border-radius:var(--r8); border:none; font-size:12px; font-weight:600;
  cursor:pointer; font-family:var(--ff); transition:var(--tr);
}
.sbtn:hover { transform:translateY(-1px); opacity:.9; }
.s-wa { background:var(--wa); color:#fff; }
.s-fb { background:#1877F2; color:#fff; }
.s-cp { background:var(--borderL); color:var(--t1); }

/* ═══════════════════════════════════════════
   FILTER CHIPS
═══════════════════════════════════════════ */
.chips-outer { padding:10px 14px 0; }
.chips-row {
  display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none;
}
.chips-row::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:6px 14px; border-radius:20px;
  border:1px solid var(--borderL); background:transparent;
  font-size:12px; font-weight:600; cursor:pointer;
  white-space:nowrap; color:var(--t2); font-family:var(--ff); transition:var(--tr);
}
.chip:hover { border-color:var(--y); color:var(--y); }
.chip.on { background:var(--y); border-color:var(--y); color:#000; }

/* ═══════════════════════════════════════════
   SORT ROW
═══════════════════════════════════════════ */
.sort-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px;
}
.res-lbl { font-size:12px; color:var(--t3); }
.sort-sel {
  background:var(--card); border:1px solid var(--borderL); border-radius:var(--r8);
  padding:5px 9px; font-size:12px; font-weight:600;
  color:var(--t1); font-family:var(--ff); cursor:pointer; outline:none; transition:var(--tr);
}
.sort-sel:focus { border-color:var(--y); }
.lm .sort-sel { background:#fff; }

/* ═══════════════════════════════════════════
   PRODUCT GRID
═══════════════════════════════════════════ */
.pgrid {
  display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:0 14px 10px;
}
@media(min-width:480px){ .pgrid { grid-template-columns:repeat(3,1fr); } }
@media(min-width:700px){ .pgrid { grid-template-columns:repeat(4,1fr); } }
@media(min-width:960px){ .pgrid { grid-template-columns:repeat(5,1fr); } }

.pcard {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r12);
  overflow:hidden; cursor:pointer; transition:var(--tr); position:relative;
  animation:fadeUp .3s ease both;
}
.pcard:hover { transform:translateY(-3px); border-color:var(--y); box-shadow:0 8px 28px rgba(245,197,24,.1); }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.pthumb {
  width:100%; aspect-ratio:1; position:relative;
  background:var(--dark); overflow:hidden;
}
.pthumb img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.pcard:hover .pthumb img { transform:scale(1.06); }
.pthumb-emoji {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:46px;
  background:linear-gradient(135deg,var(--dark) 0%, var(--border) 100%);
}
.ptags { position:absolute; top:7px; left:7px; display:flex; flex-direction:column; gap:3px; z-index:2; }
.ptag {
  font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px;
  letter-spacing:.8px; text-transform:uppercase; font-family:'Barlow Condensed',sans-serif;
}
.ptag-n { background:var(--info); color:#fff; }
.ptag-o { background:var(--danger); color:#fff; }

.pinfo { padding:8px 10px 10px; }
.pcat { font-size:9px; font-weight:700; color:var(--y); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.pname {
  font-weight:600; font-size:13px; line-height:1.3; color:var(--t1); margin-bottom:2px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.pbrand { font-size:10px; color:var(--t3); margin-bottom:4px; }
.pprice { font-family:var(--fd); font-size:18px; letter-spacing:1px; color:var(--t1); }
.pprice.nop { font-family:var(--ff); font-size:11px; color:var(--t3); letter-spacing:0; }
.pviews { font-size:10px; color:var(--t3); margin-top:3px; }

/* ═══════════════════════════════════════════
   EMPTY / LOADING
═══════════════════════════════════════════ */
.empty {
  text-align:center; padding:50px 24px; grid-column:1/-1;
}
.empty-ic { font-size:52px; display:block; margin-bottom:10px; }
.empty-t { font-weight:700; font-size:16px; color:var(--t2); margin-bottom:4px; }
.empty-s { font-size:13px; color:var(--t3); }

.spin-wrap { display:flex; align-items:center; justify-content:center; padding:40px; grid-column:1/-1; }
.spinner {
  width:30px; height:30px; border:3px solid var(--borderL);
  border-top-color:var(--y); border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ═══════════════════════════════════════════
   WA FLOAT
═══════════════════════════════════════════ */
.wa-float {
  position:fixed; bottom:76px; right:15px; z-index:90;
  background:var(--wa); border:none; border-radius:50%;
  width:52px; height:52px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,.45); cursor:pointer; font-size:26px;
  transition:var(--tr); animation:waPulse 3s infinite;
}
.wa-float:hover { transform:scale(1.1); }
@keyframes waPulse {
  0%,100% { box-shadow:0 4px 20px rgba(37,211,102,.45); }
  50%      { box-shadow:0 4px 28px rgba(37,211,102,.7); }
}

/* ═══════════════════════════════════════════
   ADMIN VIEW
═══════════════════════════════════════════ */
.adm-head {
  background:var(--dark); padding:18px 14px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.adm-head h2 { font-family:var(--fd); font-size:23px; letter-spacing:2px; color:var(--t1); }
.adm-head p { font-size:12px; color:var(--t3); margin-top:2px; }
.add-btn {
  background:var(--y); border:none; border-radius:var(--r12);
  padding:10px 15px; font-weight:700; font-size:13px; cursor:pointer;
  color:#000; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px;
  display:flex; align-items:center; gap:5px; transition:var(--tr); white-space:nowrap;
}
.add-btn:hover { background:var(--yd); transform:translateY(-1px); }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:12px 14px 0; }
.scard {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r12); padding:12px; transition:var(--tr);
}
.scard:hover { border-color:var(--y); }
.scard-ic { font-size:18px; margin-bottom:5px; display:block; }
.scard-n { font-family:var(--fd); font-size:30px; letter-spacing:1px; color:var(--t1); line-height:1; }
.scard-l { font-size:10px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:1px; margin-top:3px; }

/* ADMIN LIST */
.adm-body { padding:12px 14px 0; }
.sec-ttl {
  font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
  color:var(--t3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px;
}
.adm-srch { position:relative; margin-bottom:10px; }
.adm-srch-ic {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  font-size:14px; color:var(--t3); pointer-events:none;
}
#adm-srch-inp {
  width:100%; background:var(--card); border:1px solid var(--borderL);
  border-radius:var(--r12); padding:10px 13px 10px 35px;
  font-size:14px; color:var(--t1); font-family:var(--ff); outline:none; transition:var(--tr);
}
#adm-srch-inp:focus { border-color:var(--y); }
.lm #adm-srch-inp { background:#fff; }

.aitem {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r12);
  padding:10px; display:flex; align-items:center; gap:10px;
  margin-bottom:8px; transition:var(--tr); animation:fadeUp .25s ease both;
}
.aitem:hover { border-color:var(--borderL); }
.athumb {
  width:50px; height:50px; border-radius:var(--r8); background:var(--dark);
  display:flex; align-items:center; justify-content:center; font-size:22px;
  flex-shrink:0; overflow:hidden;
}
.athumb img { width:100%; height:100%; object-fit:cover; }
.ainfo { flex:1; min-width:0; }
.aname { font-weight:600; font-size:14px; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ameta { font-size:11px; color:var(--t3); margin-top:2px; }
.aacts { display:flex; gap:5px; }
.aact {
  width:32px; height:32px; border-radius:var(--r8); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:14px; transition:var(--tr);
}
.aact-e { background:rgba(59,130,246,.12); color:#3B82F6; }
.aact-e:hover { background:rgba(59,130,246,.25); }
.aact-d { background:rgba(239,68,68,.12); color:#EF4444; }
.aact-d:hover { background:rgba(239,68,68,.25); }
.logout-btn {
  width:100%; margin-top:14px; background:transparent;
  border:1px solid var(--borderL); border-radius:var(--r12);
  padding:10px; font-size:13px; font-weight:600; cursor:pointer;
  color:var(--t3); font-family:var(--ff); transition:var(--tr);
}
.logout-btn:hover { border-color:var(--danger); color:var(--danger); }

/* ═══════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════ */
.login-wrap {
  display:flex; align-items:center; justify-content:center;
  min-height:calc(100vh - 100px); padding:24px;
}
.login-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r24); padding:28px 24px;
  width:100%; max-width:340px; box-shadow:var(--shL);
  animation:fadeUp .3s ease both;
}
.login-logo-box {
  width:56px; height:56px; background:var(--y); border-radius:var(--r12);
  display:flex; align-items:center; justify-content:center; font-size:28px;
  margin:0 auto 10px; box-shadow:0 4px 18px rgba(245,197,24,.3);
}
.login-ttl { font-family:var(--fd); font-size:22px; letter-spacing:2px; text-align:center; color:var(--t1); }
.login-sub { font-size:12px; color:var(--t3); text-align:center; margin-bottom:20px; margin-top:3px; }
.lerr {
  background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
  color:#EF4444; padding:8px 12px; border-radius:var(--r8);
  font-size:12px; text-align:center; margin-bottom:12px; display:none;
}
.lerr.show { display:block; }

/* ═══════════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════════ */
.fg { margin-bottom:13px; }
.flabel {
  display:block; font-size:11px; font-weight:700; color:var(--t3);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:5px;
}
.finput, .fsel, .ftxt {
  width:100%; background:var(--dark); border:1px solid var(--borderL);
  border-radius:var(--r12); padding:10px 13px;
  font-size:14px; color:var(--t1); font-family:var(--ff); outline:none; transition:var(--tr);
}
.finput:focus, .fsel:focus, .ftxt:focus {
  border-color:var(--y); box-shadow:0 0 0 3px rgba(245,197,24,.08);
  background:rgba(245,197,24,.03);
}
.finput::placeholder, .ftxt::placeholder { color:var(--t3); }
.ftxt { resize:vertical; min-height:72px; }
.frow { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.lm .finput, .lm .fsel, .lm .ftxt { background:#fff; }

.main-btn {
  width:100%; background:var(--y); border:none; border-radius:var(--r12);
  padding:13px; font-weight:700; font-size:16px; cursor:pointer; color:#000;
  font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; transition:var(--tr);
}
.main-btn:hover { background:var(--yd); transform:translateY(-1px); }
.main-btn:active { transform:translateY(0); }
.main-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.demo-hint {
  text-align:center; font-size:11px; color:var(--t3);
  margin-top:10px; padding-top:10px; border-top:1px solid var(--border);
}
.demo-hint code {
  background:var(--borderL); padding:1px 6px; border-radius:4px;
  font-size:11px; color:var(--y);
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.ov {
  position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:200;
  display:none; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(5px);
}
.ov.open { display:flex; }
.mbox {
  background:var(--card); border-radius:var(--r20) var(--r20) 0 0;
  width:100%; max-width:520px; max-height:92vh; overflow-y:auto;
  padding:18px 15px 36px; border-top:1px solid var(--border);
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1) both;
}
.mbox::-webkit-scrollbar { display:none; }
@keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }

.mhandle { width:36px; height:4px; background:var(--borderL); border-radius:2px; margin:0 auto 14px; }
.mhdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:15px; }
.mttl { font-family:var(--fd); font-size:22px; letter-spacing:1px; color:var(--t1); }
.mcls {
  width:30px; height:30px; background:var(--borderL); border:none; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:14px; color:var(--t2); transition:var(--tr);
}
.mcls:hover { background:var(--danger); color:#fff; }

/* PHOTO UPLOAD */
.photo-zone {
  border:2px dashed var(--borderL); border-radius:var(--r12); padding:20px;
  text-align:center; cursor:pointer; position:relative; overflow:hidden;
  margin-bottom:12px; transition:var(--tr);
}
.photo-zone:hover { border-color:var(--y); background:var(--ydim); }
.photo-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pz-ic { font-size:28px; display:block; margin-bottom:5px; }
.pz-txt { font-size:13px; color:var(--t2); }
.pz-sub { font-size:11px; color:var(--t3); margin-top:2px; }

.prev-img {
  width:100%; height:140px; object-fit:cover; border-radius:var(--r12);
  margin-bottom:12px; display:none; border:1px solid var(--border);
}
.prev-img.show { display:block; }
.upload-progress {
  background:var(--borderL); border-radius:4px; height:4px; margin-bottom:12px; overflow:hidden; display:none;
}

.btoggle.on-o { border-color:var(--danger); background:rgba(239,68,68,.15); color:#F87171; }

/* ═══════════════════════════════════════════
   DETAIL MODAL
═══════════════════════════════════════════ */
.det-wrap {

}
.det-img-box img { width:100%; height:100%; object-fit:cover; }
.det-emoji {

/* ═══════════════════════════════════════════

<!-- FIREBASE SDK -->
<script type="module">
/* ═══════════════════════════════════════════════════════════
   FERRETERÍA PARADA — Sistema Completo con Firebase
   v3.0 — Producción ready
   ═══════════════════════════════════════════════════════════ */

import { initializeApp }                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ──────────────────────────────────────────
   CONFIG FIREBASE
────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "AIzaSyBIBBRu1ll44ai9BawD1GqCn-Sx4U_rFx4",
  authDomain:        "ferreteria-parada.firebaseapp.com",
  projectId:         "ferreteria-parada",
  storageBucket:     "ferreteria-parada.firebasestorage.app",
  messagingSenderId: "625205395204",
  appId:             "1:625205395204:web:c170e581b3bfc6121c9a51",
  measurementId:     "G-MFG0KXN5H9"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const stor = getStorage(app);
const auth = getAuth(app);

/* ──────────────────────────────────────────
   STATE
────────────────────────────────────────── */
const S = {
  products:     [],     // cache en memoria
  categories:   [],     // cache en memoria
  user:         null,   // usuario Firebase Auth
  lightMode:    false,
  curView:      'catalog',
  activeFilter: 'Todos',
  editingId:    null,
  photoFile:    null,   // File object (no base64)
  photoPreview: null,   // URL.createObjectURL
  toastTmr:     null,
  confCb:       null,
  tagNew:       false,
  tagOffer:     false,
  fbOk:         false,
};

/* ──────────────────────────────────────────
   EMOJI MAP
────────────────────────────────────────── */
const EMOJI = {
  Herramientas:'🔨', Electricidad:'⚡', Construcción:'🏗️',
  Plomería:'🔧', Pintura:'🎨', Fijaciones:'🔩',
  Seguridad:'🔐', Jardín:'🌿', Cerrajería:'🗝️', General:'📦'
};
function catEmoji(cat){ return EMOJI[cat] || '📦'; }

/* ──────────────────────────────────────────
   FIREBASE STATUS
────────────────────────────────────────── */
function setFbStatus(ok, err){
  S.fbOk = ok;
  // Se usa en admin header
}

/* ──────────────────────────────────────────
   FIRESTORE — ESCUCHA EN TIEMPO REAL
────────────────────────────────────────── */
let unsubProducts = null;
let unsubCats     = null;

function subscribeProducts(){
  if(unsubProducts) unsubProducts();
  const q = query(collection(db,'products'), orderBy('createdAt','desc'));
  unsubProducts = onSnapshot(q,
    snap => {
      S.products = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
      setFbStatus(true);
      renderChips();
      filterCatalog();
      if(S.curView === 'admin' && S.user) renderAdminList();
    },
    err => {
      console.error('Firestore error:', err);
      setFbStatus(false, err);
      showToast('⚠️ Error de conexión. Reintentando...');
    }
  );
}

function subscribeCategories(){
  if(unsubCats) unsubCats();
  unsubCats = onSnapshot(collection(db,'categories'),
    snap => {
      S.categories = snap.docs.map(d => ({ _id: d.id, name: d.data().name }));
      // Ordenar alfabéticamente
      S.categories.sort((a,b) => a.name.localeCompare(b.name));
      renderChips();
    },
    err => console.error('Categories error:', err)
  );
}

/* ──────────────────────────────────────────
   AUTH — onAuthStateChanged
────────────────────────────────────────── */
onAuthStateChanged(auth, user => {
  S.user = user;
  if(S.curView === 'admin'){
    if(user){ showAdminPanel(); }
    else     { showLoginPanel(); }
  }
});

/* ──────────────────────────────────────────
   RENDER CHIPS DE FILTRO
────────────────────────────────────────── */
function renderChips(){
  const el = document.getElementById('chips-row');
  if(!el) return;

  // Sacar categorías únicas de los productos actuales
  const cats = ['Todos', ...new Set([
    ...S.categories.map(c => c.name),
    ...S.products.map(p => p.category).filter(Boolean)
  ])].filter((v,i,a) => a.indexOf(v) === i);

  el.innerHTML = cats.map(c => `
    <button class="chip ${S.activeFilter===c?'on':''}"
      onclick="window._setFilter('${esc(c)}')">${c==='Todos'?'🏷️ Todos':c}</button>
  `).join('');
}

/* ──────────────────────────────────────────
   FILTER CATALOG — NO RE-RENDERIZA EL INPUT
   Solo actualiza el grid y el contador
────────────────────────────────────────── */
window.filterCatalog = function(){
  const q      = (document.getElementById('srch-input')?.value || '').toLowerCase();
  const sort   = document.getElementById('sort-sel')?.value || 'rec';
  const grid   = document.getElementById('pgrid');
  const resLbl = document.getElementById('res-lbl');

  let list = [...S.products];

  // Filtro texto
  if(q) list = list.filter(p =>
    (p.name||'').toLowerCase().includes(q) ||
    (p.category||'').toLowerCase().includes(q) ||
    (p.brand||'').toLowerCase().includes(q) ||
    (p.desc||'').toLowerCase().includes(q)
  );

  // Filtro categoría
  if(S.activeFilter !== 'Todos') list = list.filter(p => p.category === S.activeFilter);

  // Ordenar
  if(sort==='pop') list.sort((a,b)=>(b.views||0)-(a.views||0));
  else if(sort==='pa') list.sort((a,b)=>(a.price??99999)-(b.price??99999));
  else if(sort==='pd') list.sort((a,b)=>(b.price??0)-(a.price??0));
  // 'rec' ya viene ordenado por createdAt desc desde Firestore

  if(resLbl) resLbl.textContent = `${list.length} producto${list.length!==1?'s':''}`;

  if(!grid) return;

  if(list.length === 0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <span class="empty-ic">🔎</span>
      <div class="empty-t">Sin resultados</div>
      <div class="empty-s">Intenta con otro término o categoría</div>
    </div>`;
    return;
  }

  // Renderizar SOLO las tarjetas (sin tocar el header/search)
  grid.innerHTML = list.map((p,i) => cardHTML(p,i)).join('');
}

window._setFilter = function(f){
  S.activeFilter = f;
  renderChips();
  filterCatalog();
};

/* ──────────────────────────────────────────
   CARD HTML
────────────────────────────────────────── */
function cardHTML(p, i=0){
  const delay = Math.min(i * 0.04, 0.4);
  const thumb = p.imageURL
    ? `<img src="${esc(p.imageURL)}" alt="${esc(p.name||'')}" loading="lazy">`
    : `<div class="pthumb-emoji">${catEmoji(p.category)}</div>`;
  return `
    <div class="pcard" onclick="openDetail('${esc(p._id)}')" style="animation-delay:${delay}s">
      <div class="pthumb">
        ${thumb}
        <div class="ptags">
          ${p.isNew   ? '<span class="ptag ptag-n">NUEVO</span>'   : ''}
          ${p.isOffer ? '<span class="ptag ptag-o">OFERTA</span>' : ''}
        </div>
      </div>
      <div class="pinfo">
        <div class="pcat">${esc(p.category||'')}</div>
        <div class="pname">${esc(p.name||'')}</div>
        ${p.brand ? `<div class="pbrand">${esc(p.brand)}</div>` : ''}
        <div class="${p.price!=null?'pprice':'pprice nop'}">
          ${p.price!=null ? '$'+Number(p.price).toFixed(2) : 'Consultar precio'}
        </div>
        <div class="pviews">👁 ${p.views||0}</div>
      </div>
    </div>`;
}

/* ──────────────────────────────────────────
   OPEN DETAIL
────────────────────────────────────────── */
window.openDetail = async function(id){
  const p = S.products.find(x => x._id === id);
  if(!p) return;

  // Incrementar vistas en Firestore (no bloqueante)
  try {
    updateDoc(doc(db,'products',id), { views: (p.views||0) + 1 });
    p.views = (p.views||0) + 1; // actualizar cache local
  } catch(e){}

  const imgPart = p.imageURL
    ? `<img src="${esc(p.imageURL)}" alt="${esc(p.name||'')}">`
    : `<div class="det-emoji">${catEmoji(p.category)}</div>`;

  showModal(`
    <div class="det-wrap" onclick="stopBubble(event)">
      <div style="position:relative">
        <div class="det-img-box">
          ${imgPart}
          <button class="det-close" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div class="det-info">
        <span class="det-catbadge">${esc(p.category||'')}</span>
        <div class="det-name">${esc(p.name||'')}</div>
        ${p.brand ? `<div class="det-brand">Marca: <strong>${esc(p.brand)}</strong></div>` : ''}
        <div class="det-price">${p.price!=null ? '$'+Number(p.price).toFixed(2) : 'Consultar precio'}</div>
        ${p.desc ? `<div class="det-desc">${esc(p.desc)}</div>` : ''}
        <button class="wa-cta" onclick="contactProd('${escJ(p.name||'')}')">
          💬 Consultar por WhatsApp
        </button>
      </div>
    </div>`);
};

/* ──────────────────────────────────────────
   ADMIN PANEL
────────────────────────────────────────── */
function showAdminPanel(){
  document.getElementById('v-login').style.display = 'none';
  document.getElementById('v-admin').style.display = 'block';
  renderAdminFull();
}

function showLoginPanel(){
  document.getElementById('v-admin').style.display = 'none';
  document.getElementById('v-login').style.display = 'block';
  renderLogin();
}

function renderAdminFull(){
  document.getElementById('v-admin').innerHTML = `
    <div class="adm-head">
      <div>
        <h2>PANEL ADMIN</h2>
        <p>${S.products.length} productos · ${S.user?.email||''}</p>
      </div>
      <button class="add-btn" onclick="openProductModal()">＋ Agregar</button>
    </div>

    <!-- STATS -->
    <div class="stats" id="adm-stats"></div>

    <!-- ADMIN BODY -->
    <div class="adm-body">
      <!-- FIREBASE STATUS -->
      <div class="fb-status" id="fb-status">
        <span class="fb-dot connected" id="fb-dot"></span>
        <span id="fb-status-txt">Conectado a Firebase</span>
      </div>

window.doLogin = async function(){
  const email = document.getElementById('lu')?.value?.trim() || '';
  const pass  = document.getElementById('lp')?.value || '';
  const err   = document.getElementById('lerr');
  const btn   = document.getElementById('login-btn');

  if(!email || !pass){
    if(err){ err.textContent='Completa todos los campos.'; err.classList.add('show'); }
    return;
  }
  if(btn){ btn.disabled=true; btn.textContent='Ingresando...'; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    showToast('✅ Sesión iniciada');
  } catch(e){
    const msg = e.code === 'auth/invalid-credential' ? 'Correo o contraseña incorrectos.'
              : e.code === 'auth/too-many-requests'  ? 'Demasiados intentos. Espera un momento.'
              : 'Error al iniciar sesión.';
    if(err){ err.textContent=msg; err.classList.add('show'); }
    if(btn){ btn.disabled=false; btn.textContent='Ingresar'; }
  }
};

window.openProductModal = function(id=null){

  S.photoPreview = null;
  S.tagNew     = false;
  S.tagOffer   = false;

  const p = id ? S.products.find(x => x._id === id) : null;
  if(p){ S.tagNew = !!p.isNew; S.tagOffer = !!p.isOffer; }

  // Categorías para el select (Firestore + built-in)
  const builtIn = ['Herramientas','Electricidad','Construcción','Plomería','Pintura','Fijaciones','Seguridad','Jardín','Cerrajería','General'];
  const allCats = [...new Set([...builtIn, ...S.categories.map(c=>c.name)])].sort();

  showModal(`
    <div class="mbox" onclick="stopBubble(event)">
      <div class="mhandle"></div>
      <div class="mhdr">
        <div class="mttl">${p ? 'Editar producto' : 'Nuevo producto'}</div>
        <button class="mcls" onclick="closeModal()">✕</button>
      </div>

      <!-- FOTO -->
      <div id="photo-zone-wrap">
        ${p && p.imageURL
          ? `<img id="prev-img" class="prev-img show" src="${esc(p.imageURL)}" alt="Vista previa">
             <label style="display:block;font-size:12px;color:var(--t3);cursor:pointer;text-align:center;margin-bottom:10px">
               📷 Cambiar imagen
               <input type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhotoChange(this)">
             </label>`
          : `<div class="photo-zone">
               <input type="file" accept="image/*" capture="environment" onchange="onPhotoChange(this)">
               <span class="pz-ic">📷</span>
               <div class="pz-txt">Tomar foto o elegir imagen</div>
               <div class="pz-sub">JPG, PNG, WEBP — máx 5MB</div>
             </div>
             <img id="prev-img" class="prev-img" src="" alt="Vista previa">`}
      </div>

      <div class="upload-progress" id="upload-progress">
        <div class="upload-bar" id="upload-bar"></div>
      </div>

      <div class="fg">
        <label class="flabel">Nombre del producto *</label>
        <input id="f-name" class="finput" type="text" placeholder="Ej: Martillo Stanley 16oz"
          value="${p ? esc(p.name||'') : ''}" maxlength="100">
      </div>

      <div class="frow">
        <div class="fg">
          <label class="flabel">Categoría *</label>
          <select id="f-cat" class="fsel">
            ${allCats.map(c => `<option value="${esc(c)}" ${p&&p.category===c?'selected':''}>${esc(c)}</option>`).join('')}
          </select>
        </div>
        <div class="fg">
          <label class="flabel">Precio ($)</label>
          <input id="f-price" class="finput" type="number" min="0" step="0.01"
            placeholder="Opcional" value="${p&&p.price!=null?p.price:''}">
        </div>
      </div>

      <div class="fg">
        <label class="flabel">Marca</label>
        <input id="f-brand" class="finput" type="text"
          placeholder="Opcional — Ej: Bosch, Stanley"
          value="${p ? esc(p.brand||'') : ''}" maxlength="60">
      </div>

      <div class="fg">
        <label class="flabel">Descripción</label>
        <textarea id="f-desc" class="ftxt" placeholder="Describe el producto brevemente..." maxlength="400">${p ? esc(p.desc||'') : ''}</textarea>
      </div>

      <div class="fg">
        <label class="flabel">Etiquetas</label>

          <button id="tog-new" class="btoggle ${p&&p.isNew?'on-n':''}" onclick="toggleTag('new')">🔵 NUEVO</button>

window.toggleTag = function(type){
  if(type==='new'){
    S.tagNew = !S.tagNew;
    const b = document.getElementById('tog-new');
    if(b) b.className = 'btoggle' + (S.tagNew ? ' on-n' : '');
  } else {
    S.tagOffer = !S.tagOffer;
    const b = document.getElementById('tog-off');
    if(b) b.className = 'btoggle' + (S.tagOffer ? ' on-o' : '');
  }
};

window.onPhotoChange = function(input){
  const file = input.files?.[0];
  if(!file) return;
  if(file.size > 5 * 1024 * 1024){ showToast('⚠️ Imagen muy grande (máx 5MB)'); return; }
  S.photoFile = file;
  S.photoPreview = URL.createObjectURL(file);
  const prev = document.getElementById('prev-img');
  const zone = document.querySelector('.photo-zone');
  if(prev){ prev.src = S.photoPreview; prev.classList.add('show'); }
  if(zone){ zone.style.display = 'none'; }
};

/* ── GUARDAR PRODUCTO ── */
window.saveProduct = async function(){
  const name     = (document.getElementById('f-name')?.value  || '').trim();
  const cat      =  document.getElementById('f-cat')?.value   || 'General';
  const priceRaw =  document.getElementById('f-price')?.value;
  const brand    = (document.getElementById('f-brand')?.value || '').trim();
  const desc     = (document.getElementById('f-desc')?.value  || '').trim();

  if(!name){ showToast('⚠️ El nombre es obligatorio'); document.getElementById('f-name')?.focus(); return; }

  const price = priceRaw !== '' ? parseFloat(priceRaw) : null;
  if(priceRaw && (isNaN(price)||price<0)){ showToast('⚠️ Precio inválido'); return; }

  const btn = document.getElementById('save-btn');
  if(btn){ btn.disabled=true; btn.textContent='Guardando...'; }

  try {
    let imageURL = null;

    // SUBIR IMAGEN A FIREBASE STORAGE
    if(S.photoFile){
      const prog   = document.getElementById('upload-progress');
      const bar    = document.getElementById('upload-bar');
      if(prog) prog.classList.add('show');

      const sRef   = ref(stor, `products/${Date.now()}_${S.photoFile.name.replace(/\s+/g,'_')}`);
      const upload = uploadBytesResumable(sRef, S.photoFile);

      imageURL = await new Promise((resolve, reject) => {
        upload.on('state_changed',
          snap => {
            const pct = (snap.bytesTransferred / snap.totalBytes * 100).toFixed(0);
            if(bar) bar.style.width = pct + '%';
          },
          reject,
          async () => {
            const url = await getDownloadURL(upload.snapshot.ref);
            resolve(url);
          }
        );
      });

      if(prog) prog.classList.remove('show');
    }

    const data = {
      name, category: cat, brand: brand||null, price,
      desc: desc||null, isNew: S.tagNew, isOffer: S.tagOffer,
    };

    if(S.editingId){
      // UPDATE
      const oldProd = S.products.find(x => x._id === S.editingId);
      if(imageURL) data.imageURL = imageURL;
      else if(oldProd?.imageURL) data.imageURL = oldProd.imageURL;
      else data.imageURL = null;

      await updateDoc(doc(db,'products', S.editingId), data);
      showToast('✅ Producto actualizado');
    } else {
      // CREATE
      data.imageURL  = imageURL || null;
      data.views     = 0;
      data.createdAt = serverTimestamp();
      await addDoc(collection(db,'products'), data);
      showToast('✅ Producto agregado');
    }

    closeModal();
    // onSnapshot actualizará la lista automáticamente

  } catch(e){
    console.error('saveProduct error:', e);
    showToast('❌ Error al guardar: ' + e.message);
    if(btn){ btn.disabled=false; btn.textContent='💾 Guardar producto'; }
  }
};

      renderAdminFull();

      document.getElementById('v-login').style.display='block';
      document.getElementById('v-login').classList.add('on');

  document.querySelectorAll('.bni').forEach(b => b.classList.remove('on'));

/* ──────────────────────────────────────────
   UTILS — ANTI-XSS
────────────────────────────────────────── */
function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escJ(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
